<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sovereign Administration Gateway - YojanaBasket</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#00113a",
              "primary-container": "#002366",
              secondary: "#8f4e00",
              "secondary-container": "#fe9832",
              "on-secondary-container": "#683700",
              background: "#f8f9ff",
              surface: "#f8f9ff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#eff4ff",
              "surface-container-high": "#dce9ff",
              "on-surface": "#0b1c30",
              "on-surface-variant": "#444650",
              "outline-variant": "#c5c6d2",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background text-on-surface flex flex-col min-h-screen">
    <header class="bg-surface-container-lowest shadow-sm">
      <div
        class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto"
      >
        <div
          class="text-2xl font-bold text-primary tracking-tight cursor-pointer"
          onclick="window.location.href = '/index.html'"
        >
          YojanaBasket
        </div>
        <div class="flex items-center gap-4">
          <div
            class="text-xs bg-red-50 text-red-700 font-bold px-3 py-1.5 rounded-full border border-red-200 uppercase tracking-wider"
          >
            Internal Console Area
          </div>
          <button
            id="adminSignOutBtn"
            onclick="executeAdminSignOut()"
            class="hidden text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold px-3 py-1.5 rounded-lg transition-all"
          >
            Sign Out
          </button>
        </div>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 pb-24">
      <div
        id="adminAuthCard"
        class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-xl border border-outline-variant flex flex-col"
      >
        <div class="bg-primary p-6 text-white">
          <h3 class="text-xl font-bold flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary-container"
              >shield_person</span
            >
            Administrative Portal
          </h3>
          <p class="text-xs opacity-70 mt-1">
            Official Sovereign Framework Console Authentication Gate
          </p>
        </div>
        <div class="p-6">
          <div
            id="adminAlertBanner"
            class="mb-4 p-3 rounded-lg text-xs font-medium hidden"
          ></div>
          <form
            id="adminPortalLoginForm"
            class="space-y-4"
            onsubmit="executeAdminLogin(event)"
          >
            <div>
              <label
                class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
                >Admin Account Identifier</label
              >
              <input
                type="text"
                id="adminCredentialField"
                required
                class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
                placeholder="Username"
              />
            </div>
            <div>
              <label
                class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
                >Administrative Password</label
              >
              <input
                type="password"
                id="adminPasswordField"
                required
                class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
                placeholder="••••••••"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-primary text-white font-bold py-3 rounded-lg min-h-[48px] hover:bg-primary-container transition-colors shadow flex items-center justify-center gap-2"
            >
              <span class="material-symbols-outlined text-sm">lock_open</span>
              Authenticate Credentials
            </button>
          </form>
        </div>
      </div>

      <div
        id="adminDashboardPanel"
        class="hidden bg-white rounded-2xl w-full max-w-4xl p-6 shadow-xl border border-outline-variant flex flex-col"
      >
        <div class="border-b pb-4 mb-6">
          <h3 class="text-2xl font-bold text-primary flex items-center gap-2">
            <span class="material-symbols-outlined text-secondary-container"
              >playlist_add</span
            >
            Deploy New Government Welfare Scheme
          </h3>
        </div>

        <div
          id="schemeFormAlertBanner"
          class="mb-4 p-3 rounded-lg text-xs font-medium hidden"
        ></div>

        <form
          id="addSchemeDataForm"
          onsubmit="submitNewSchemeToRegistry(event)"
          class="grid grid-cols-1 md:grid-cols-2 gap-5"
        >
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Unique Scheme ID (Slug)*</label
            >
            <input
              type="text"
              id="schemeId"
              required
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
              placeholder="e.g. pm-kisan-new"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Scheme Name (English)*</label
            >
            <input
              type="text"
              id="schemeName"
              required
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
              placeholder="e.g. Pradhan Mantri Kisan Nidhi"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Scheme Name (Hindi Line)</label
            >
            <input
              type="text"
              id="schemeHindiName"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
              placeholder="e.g. प्रधानमंत्री किसान निधि"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Category Domain Group*</label
            >
            <select
              id="schemeCategory"
              required
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            >
              <option value="farming">Farming / Agriculture</option>
              <option value="health">Health & Medical Cover</option>
              <option value="loans">Loans & Business Credits</option>
              <option value="education">Education & Scholarships</option>
              <option value="housing">Housing & Infrastructure</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Complete Descriptive Summary*</label
            >
            <textarea
              id="schemeDescription"
              required
              rows="3"
              class="w-full rounded-lg border-outline-variant text-sm"
              placeholder="Provide a summary detailing scope boundaries..."
            ></textarea>
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Governing Authority</label
            >
            <input
              type="text"
              id="schemeMinistry"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Benefits</label
            >
            <input
              type="text"
              id="schemeBenefits"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div class="md:col-span-2">
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Required Documents</label
            >
            <input
              type="text"
              id="schemeDocuments"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Min Age</label
            >
            <input
              type="number"
              id="schemeMinAge"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Max Age</label
            >
            <input
              type="number"
              id="schemeMaxAge"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Gender</label
            >
            <select
              id="schemeGender"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            >
              <option value="all">All</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >State Tier Scope*</label
            >
            <select
              id="schemeState"
              required
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            >
              <option value="central">Central / Nationwide</option>
              <option value="Bihar">Bihar</option>
              <option value="Delhi">Delhi</option>
              <option value="Maharashtra">Maharashtra</option>
              <option value="Uttar Pradesh">Uttar Pradesh</option>
              <option value="Karnataka">Karnataka</option>
            </select>
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Castes</label
            >
            <input
              type="text"
              id="schemeCaste"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
              value="all"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Max Income Ceiling</label
            >
            <input
              type="number"
              id="schemeMaxIncome"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div class="md:col-span-2">
            <label
              class="block text-xs font-bold uppercase text-on-surface-variant mb-1"
              >Official Portal URL</label
            >
            <input
              type="url"
              id="schemeOfficialLink"
              class="w-full rounded-lg border-outline-variant text-sm min-h-[44px]"
            />
          </div>
          <div
            class="md:col-span-2 flex items-center gap-3 bg-surface-container-low p-3 rounded-xl border border-outline-variant/60"
          >
            <input
              type="checkbox"
              id="schemeRequiresDisability"
              class="rounded text-primary focus:ring-primary w-5 h-5"
            />
            <label
              for="schemeRequiresDisability"
              class="text-xs font-semibold text-primary"
              >Requires disability classification</label
            >
          </div>
          <div class="md:col-span-2 border-t pt-4 flex gap-4 justify-end">
            <button
              type="button"
              onclick="resetSchemeForm()"
              class="bg-gray-100 text-gray-700 font-bold px-6 py-3 rounded-lg"
            >
              Clear
            </button>
            <button
              type="submit"
              class="bg-primary text-white font-bold px-8 py-3 rounded-lg hover:bg-primary-container transition-colors shadow"
            >
              Publish Scheme Entry 🚀
            </button>
          </div>
        </form>
      </div>
    </main>

    <div class="fixed bottom-6 right-6 z-[90] flex flex-col items-end">
      <div
        id="sarthiWorkspacePanel"
        class="w-80 md:w-96 h-[400px] bg-white rounded-2xl border border-outline-variant shadow-xl flex flex-col mb-4 hidden overflow-hidden transition-all"
      >
        <div
          class="bg-primary p-4 text-white flex justify-between items-center text-xs font-bold"
        >
          <span class="flex items-center gap-2">
            <img
              src="icon.jpeg"
              alt="Sarthi"
              class="w-5 h-5 rounded-full object-cover ring-1 ring-white/40"
            />
            <span>Sarthi AI Assistant (Admin Console)</span>
          </span>
          <button
            onclick="toggleSarthiPanel(false)"
            class="opacity-80 hover:opacity-100"
          >
            <span class="material-symbols-outlined text-sm">close</span>
          </button>
        </div>
        <div
          id="sarthiChatConsoleStream"
          class="flex-grow p-4 overflow-y-auto space-y-3 bg-surface-container-low text-xs"
        ></div>
        <div class="p-3 border-t bg-white flex gap-2 items-center">
          <input
            type="text"
            id="sarthiQueryConsoleInput"
            class="flex-grow rounded-lg border-outline-variant text-xs min-h-[40px] focus:ring-primary"
            placeholder="Ask structural query parameters..."
            onkeypress="handleSarthiKeyPress(event)"
          />
          <button
            onclick="
              startAdminVoiceRecognition(
                'sarthiQueryConsoleInput',
                'sarthiSendActionBtn',
              )
            "
            class="p-2 hover:bg-surface-container-low rounded-full text-on-surface-variant flex items-center justify-center transition-colors"
          >
            <span
              id="mic-icon-sarthiQueryConsoleInput"
              class="material-symbols-outlined text-lg"
              >mic</span
            >
          </button>
          <button
            id="sarthiSendActionBtn"
            onclick="processSarthiQueryTransmission()"
            class="bg-primary text-white h-9 w-9 rounded-lg flex items-center justify-center hover:bg-primary-container shrink-0"
          >
            <span class="material-symbols-outlined text-sm">send</span>
          </button>
        </div>
      </div>
      <button
        onclick="toggleSarthiPanel(true)"
        class="w-14 h-14 bg-white rounded-full shadow-lg flex items-center justify-center ring-4 ring-primary/20 hover:scale-105 transition-all overflow-hidden"
      >
        <img
          src="icon.jpeg"
          alt="Sarthi Logo"
          class="w-full h-full object-cover"
        />
      </button>
    </div>

    <footer
      class="bg-surface-container-low py-4 text-center text-[11px] text-on-surface-variant border-t"
    >
      Authorized personnel operations explicitly protected.
    </footer>

    <script src="js/lang.js"></script>
    <script src="js/sarthi.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("yojana_admin_token")) {
          switchViewLayouts(true);
        }
      });

      function startAdminVoiceRecognition(inputId, triggerBtnId) {
        const SpeechRecognition =
          window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        const recognition = new SpeechRecognition();
        const micIcon = document.getElementById(`mic-icon-${inputId}`);
        const targetInput = document.getElementById(inputId);

        recognition.onstart = () => {
          if (micIcon)
            micIcon.className =
              "material-symbols-outlined text-lg text-red-600 animate-pulse";
        };
        recognition.onend = () => {
          if (micIcon)
            micIcon.className =
              "material-symbols-outlined text-lg text-on-surface-variant";
        };
        recognition.onresult = (event) => {
          if (targetInput) {
            targetInput.value = event.results[0][0].transcript;
            setTimeout(() => {
              document.getElementById(triggerBtnId).click();
            }, 400);
          }
        };
        recognition.start();
      }

      function switchViewLayouts(authenticated) {
        if (authenticated) {
          document.getElementById("adminAuthCard").classList.add("hidden");
          document
            .getElementById("adminDashboardPanel")
            .classList.remove("hidden");
          document.getElementById("adminSignOutBtn").classList.remove("hidden");
        } else {
          document.getElementById("adminAuthCard").classList.remove("hidden");
          document
            .getElementById("adminDashboardPanel")
            .classList.add("hidden");
          document.getElementById("adminSignOutBtn").classList.add("hidden");
        }
      }

      async function executeAdminLogin(event) {
        event.preventDefault();
        const credential = document
          .getElementById("adminCredentialField")
          .value.trim();
        const password = document.getElementById("adminPasswordField").value;
        const banner = document.getElementById("adminAlertBanner");
        try {
          const response = await fetch("/api/auth/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ credential, password }),
          });
          const output = await response.json();
          if (!response.ok) {
            banner.innerText = output.error || "Access Denied.";
            banner.className =
              "mb-4 p-3 rounded-lg text-xs font-medium bg-red-50 text-red-700 border border-red-200";
            banner.classList.remove("hidden");
            return;
          }
          localStorage.setItem(
            "yojana_admin_token",
            JSON.stringify(output.adminDetails),
          );
          switchViewLayouts(true);
        } catch (err) {
          banner.innerText = "Connection error.";
          banner.classList.remove("hidden");
        }
      }

      async function submitNewSchemeToRegistry(event) {
        event.preventDefault();
        const banner = document.getElementById("schemeFormAlertBanner");
        const payload = {
          id: document.getElementById("schemeId").value,
          name: document.getElementById("schemeName").value,
          hindiName: document.getElementById("schemeHindiName").value,
          category: document.getElementById("schemeCategory").value,
          description: document.getElementById("schemeDescription").value,
          ministry: document.getElementById("schemeMinistry").value,
          benefits: document.getElementById("schemeBenefits").value,
          requiredDocuments: document.getElementById("schemeDocuments").value,
          minAge: document.getElementById("schemeMinAge").value,
          maxAge: document.getElementById("schemeMaxAge").value,
          gender: document.getElementById("schemeGender").value,
          state: document.getElementById("schemeState").value,
          caste: document.getElementById("schemeCaste").value,
          maxIncome: document.getElementById("schemeMaxIncome").value,
          requiresDisability: document.getElementById(
            "schemeRequiresDisability",
          ).checked,
          officialLink: document.getElementById("schemeOfficialLink").value,
        };

        try {
          const response = await fetch("/api/admin/schemes/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const output = await response.json();
          if (!response.ok) {
            banner.innerText = output.error || "Failed to publish scheme.";
            banner.className =
              "mb-4 p-3 rounded-lg text-xs font-medium bg-red-50 text-red-700 border border-red-200";
            banner.classList.remove("hidden");
            return;
          }
          banner.innerText = "Success! New scheme entry published.";
          banner.className =
            "mb-4 p-3 rounded-lg text-xs font-medium bg-green-50 text-green-700 border border-green-200";
          banner.classList.remove("hidden");
          document.getElementById("addSchemeDataForm").reset();
        } catch (err) {
          banner.innerText = "Network error.";
          banner.classList.remove("hidden");
        }
      }

      function resetSchemeForm() {
        document.getElementById("addSchemeDataForm").reset();
        document
          .getElementById("schemeFormAlertBanner")
          .classList.add("hidden");
      }

      function executeAdminSignOut() {
        localStorage.removeItem("yojana_admin_token");
        switchViewLayouts(false);
        resetSchemeForm();
      }
    </script>
  </body>
</html>
